services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/rtm
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      STORAGE_ENDPOINT: http://seaweedfs:8333
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-rtm}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rtm
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d rtm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: server -dir=/data -s3 -s3.port=8333 -filer -filer.port=8888
    ports:
      - "8333:8333"
    volumes:
      - seaweedfs_data:/data
    restart: unless-stopped

  # Записывает IAM-конфиг в filer и создаёт S3-бакет
  seaweedfs-init:
    image: alpine:latest
    entrypoint: ["/bin/sh", "/init.sh"]
    environment:
      AWS_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${STORAGE_SECRET_KEY}
      AWS_DEFAULT_REGION: us-east-1
      STORAGE_BUCKET: ${STORAGE_BUCKET:-rtm}
    volumes:
      - ./seaweedfs/init.sh:/init.sh:ro
    depends_on:
      - seaweedfs
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  seaweedfs_data:
