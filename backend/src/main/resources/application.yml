spring:
  application:
    name: rtm
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rtm}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:2425}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rtm}
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:2425}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
server:
  port: ${SERVER_PORT:8080}
jwt:
  refresh-token-ttl-days: ${JWT_REFRESH_TTL_DAYS:10}
  access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
  secret-key: ${JWT_SECRET_KEY:9clnLqt2iaXR082zDhflEkWGKdJpxZEfzWpRPRBazIc=}
logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.web.servlet.mvc.method.annotation: DEBUG
storage:
  endpoint: ${STORAGE_ENDPOINT:http://localhost:8333}
  public-url: ${STORAGE_PUBLIC_URL:${STORAGE_ENDPOINT:http://localhost:8333}}
  bucket: ${STORAGE_BUCKET:rtm}
  access-key: ${STORAGE_ACCESS_KEY:minioadmin}
  secret-key: ${STORAGE_SECRET_KEY:minioadmin123}
